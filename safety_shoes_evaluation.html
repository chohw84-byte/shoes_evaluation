<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>안전화 제품 평가표</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 40px 48px;
      width: 100%;
      max-width: 820px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a2e4a;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── 평가자 정보 카드 ── */
    .evaluator-card {
      background: #f4f8ff;
      border: 1.5px solid #c5d6f0;
      border-radius: 10px;
      padding: 20px 24px;
      margin: 20px 0 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: flex-end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 180px;
    }

    .field-group label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a2e4a;
    }

    .required-mark { color: #e53935; }

    .field-group input {
      padding: 9px 14px;
      border: 1.5px solid #c5d6f0;
      border-radius: 7px;
      font-size: 0.97rem;
      color: #1a2e4a;
      background: #fff;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .field-group input:focus {
      border-color: #1a2e4a;
      box-shadow: 0 0 0 3px rgba(26,46,74,0.08);
    }

    .field-group input.invalid {
      border-color: #e53935;
      background: #fff5f5;
    }

    .field-group input:disabled {
      background: #e8edf3;
      color: #555;
      cursor: not-allowed;
    }

    .field-error {
      font-size: 0.78rem;
      color: #e53935;
      min-height: 16px;
    }

    /* ── 안내 문구 ── */
    .notice {
      background: #fff8e1;
      border-left: 4px solid #f4b400;
      border-radius: 6px;
      padding: 12px 18px;
      margin: 0 0 24px;
      color: #7a5c00;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 제출 완료 배너 ── */
    .submitted-banner {
      display: none;
      background: #e8f5e9;
      border: 1.5px solid #43a047;
      border-radius: 10px;
      padding: 16px 22px;
      margin: 0 0 20px;
      color: #1b5e20;
      font-size: 0.97rem;
      align-items: center;
      gap: 12px;
    }

    .submitted-banner .s-icon { font-size: 1.6rem; }

    /* ── 표 ── */
    .table-wrapper { position: relative; }

    .lock-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(240,244,248,0.45);
      border-radius: 10px;
      z-index: 10;
      cursor: not-allowed;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead tr { background: #1a2e4a; color: #fff; }

    thead th {
      padding: 14px 10px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    thead th:first-child {
      border-radius: 10px 0 0 0;
      text-align: left;
      padding-left: 20px;
      width: 120px;
    }

    thead th:last-child { border-radius: 0 10px 0 0; }

    tbody tr {
      border-bottom: 1px solid #e8edf3;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #f4f8ff; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 16px 10px;
      text-align: center;
      vertical-align: middle;
    }

    tbody td:first-child {
      text-align: left;
      padding-left: 20px;
      font-weight: 600;
      color: #1a2e4a;
      white-space: nowrap;
    }

    /* ── 별점 ── */
    .star-group {
      display: inline-flex;
      flex-direction: row-reverse;
      gap: 3px;
      justify-content: center;
    }

    .star-group input[type="radio"] { display: none; }

    .star-group label {
      font-size: 1.7rem;
      color: #d0d7e2;
      cursor: pointer;
      transition: color 0.12s, transform 0.1s;
      line-height: 1;
      user-select: none;
    }

    .star-group input:checked ~ label,
    .star-group label:hover,
    .star-group label:hover ~ label {
      color: #f4b400;
    }

    .star-group label:active { transform: scale(1.15); }

    /* 잠금 시 */
    .locked .star-group label {
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── 버튼 영역 ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: flex-end;
    }

    button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s;
    }

    .btn-reset { background: #e8edf3; color: #444; }
    .btn-reset:hover:not(:disabled) { background: #d0d7e2; }

    .btn-print { background: #1a2e4a; color: #fff; }
    .btn-print:hover:not(:disabled) { background: #253f67; }

    .submit-divider {
      border: none;
      border-top: 1.5px dashed #c5d6f0;
      margin: 28px 0 0;
    }

    .submit-row {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .btn-submit {
      background: #1b8a3e;
      color: #fff;
      padding: 13px 48px;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }

    .btn-submit:hover:not(:disabled) {
      background: #156e31;
      box-shadow: 0 3px 10px rgba(27,138,62,0.25);
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    @media print {
      body { background: #fff; padding: 0; }
      .container { box-shadow: none; padding: 10px; }
      .btn-row, .submit-row, .submit-divider { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🥾 안전화 제품 평가표</h1>

  <!-- 평가자 정보 -->
  <div class="evaluator-card">
    <div class="field-group">
      <label for="inputName">성명 <span class="required-mark">*</span></label>
      <input type="text" id="inputName" placeholder="이름을 입력하세요" maxlength="20" autocomplete="off"/>
      <span class="field-error" id="errName"></span>
    </div>
    <div class="field-group">
      <label for="inputTeam">소속팀 <span class="required-mark">*</span></label>
      <input type="text" id="inputTeam" placeholder="소속팀을 입력하세요" maxlength="30" autocomplete="off"/>
      <span class="field-error" id="errTeam"></span>
    </div>
  </div>

  <!-- 안내 문구 -->
  <div class="notice">
    ⚠️&nbsp; 평가를 하지 않은 항목은 <strong>&nbsp;자동으로 3점</strong>으로 반영됩니다. 별을 클릭하여 1~5점으로 평가해 주세요.
  </div>

  <!-- 제출 완료 배너 -->
  <div class="submitted-banner" id="submittedBanner">
    <span class="s-icon">✅</span>
    <div>
      <strong style="font-size:1.05rem;">평가가 제출되었습니다.</strong><br/>
      <span id="submittedInfo" style="font-size:0.88rem;"></span><br/>
      <span style="font-size:0.85rem; color:#388e3c;">제출된 평가는 수정할 수 없습니다.</span>
    </div>
  </div>

  <!-- 평가 표 -->
  <div class="table-wrapper">
    <div class="lock-overlay" id="lockOverlay"></div>
    <table>
      <thead>
        <tr>
          <th>제품</th>
          <th>⭐ 품질</th>
          <th>🦶 착용감</th>
          <th>🔩 내구성</th>
          <th>🎨 디자인</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- 버튼 -->
  <div class="btn-row">
    <button class="btn-reset" id="btnReset" onclick="resetAll()">↺ 초기화</button>
    <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
  </div>

  <hr class="submit-divider"/>
  <div class="submit-row">
    <button class="btn-submit" id="btnSubmit" onclick="submitEval()">📤 평가 제출</button>
  </div>
</div>

<script>
  const PRODUCTS  = ['1번 제품','2번 제품','3번 제품','4번 제품','5번 제품','6번 제품'];
  const CRITERIA  = ['품질','착용감','내구성','디자인'];
  const DEFAULT   = 3;
  const STORE_KEY = 'safety_eval_submissions';

  const scores = Array.from({length: 6}, () => Array(4).fill(DEFAULT));

  /* ── 표 생성 (별점만, 숫자 없음) ── */
  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    PRODUCTS.forEach((prod, pi) => {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      nameTd.textContent = prod;
      tr.appendChild(nameTd);

      CRITERIA.forEach((_, ci) => {
        const td = document.createElement('td');
        td.innerHTML = `
          <div class="star-group" id="stars-${pi}-${ci}">
            ${[5,4,3,2,1].map(v => `
              <input type="radio" id="r-${pi}-${ci}-${v}" name="r-${pi}-${ci}" value="${v}" ${v === DEFAULT ? 'checked' : ''}>
              <label for="r-${pi}-${ci}-${v}" title="${v}점">★</label>
            `).join('')}
          </div>`;
        tr.appendChild(td);

        td.addEventListener('change', e => {
          scores[pi][ci] = parseInt(e.target.value);
        });
      });

      tbody.appendChild(tr);
    });
  }

  /* ── 초기화 ── */
  function resetAll() {
    if (isLocked()) return;
    if (!confirm('모든 평가를 초기값(3점)으로 초기화할까요?')) return;
    for (let pi = 0; pi < 6; pi++)
      for (let ci = 0; ci < 4; ci++) {
        scores[pi][ci] = DEFAULT;
        document.getElementById(`r-${pi}-${ci}-${DEFAULT}`).checked = true;
      }
  }

  /* ── 유효성 검사 ── */
  function validate() {
    const name = document.getElementById('inputName').value.trim();
    const team = document.getElementById('inputTeam').value.trim();
    let ok = true;

    if (!name) {
      document.getElementById('errName').textContent = '성명을 입력해 주세요.';
      document.getElementById('inputName').classList.add('invalid');
      ok = false;
    } else {
      document.getElementById('errName').textContent = '';
      document.getElementById('inputName').classList.remove('invalid');
    }
    if (!team) {
      document.getElementById('errTeam').textContent = '소속팀을 입력해 주세요.';
      document.getElementById('inputTeam').classList.add('invalid');
      ok = false;
    } else {
      document.getElementById('errTeam').textContent = '';
      document.getElementById('inputTeam').classList.remove('invalid');
    }
    return ok ? { name, team } : null;
  }

  /* ── 제출 ── */
  function submitEval() {
    const info = validate();
    if (!info) return;

    const subs = getSubmissions();
    const dup = subs.find(s => s.name === info.name && s.team === info.team);
    if (dup) {
      alert(`이미 제출한 평가자입니다.\n\n성명: ${dup.name}\n소속팀: ${dup.team}\n제출일시: ${dup.submittedAt}\n\n동일 평가자는 재제출할 수 없습니다.`);
      return;
    }

    if (!confirm(`아래 정보로 평가를 제출하시겠습니까?\n\n성명: ${info.name}\n소속팀: ${info.team}\n\n⚠ 제출 후에는 수정이 불가능합니다.`)) return;

    const now = new Date();
    const submittedAt = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

    const submission = { name: info.name, team: info.team, scores: scores.map(r=>[...r]), submittedAt };
    subs.push(submission);
    localStorage.setItem(STORE_KEY, JSON.stringify(subs));
    applyLock(submission);
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  /* ── 잠금 ── */
  function applyLock(sub) {
    document.getElementById('inputName').value    = sub.name;
    document.getElementById('inputTeam').value    = sub.team;
    document.getElementById('inputName').disabled = true;
    document.getElementById('inputTeam').disabled = true;

    sub.scores.forEach((row, pi) => {
      row.forEach((val, ci) => {
        scores[pi][ci] = val;
        document.getElementById(`r-${pi}-${ci}-${val}`).checked = true;
      });
    });

    document.querySelectorAll('#tableBody input[type="radio"]').forEach(r => r.disabled = true);
    document.querySelectorAll('#tableBody .star-group').forEach(g => g.classList.add('locked'));
    document.getElementById('lockOverlay').style.display = 'block';
    document.getElementById('btnReset').disabled  = true;
    document.getElementById('btnSubmit').disabled = true;

    const banner = document.getElementById('submittedBanner');
    banner.style.display = 'flex';
    document.getElementById('submittedInfo').textContent =
      `${sub.name} · ${sub.team} · 제출일시: ${sub.submittedAt}`;
  }

  function isLocked() { return document.getElementById('btnSubmit').disabled; }

  /* ── localStorage ── */
  function getSubmissions() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) { return []; }
  }

  /* ── 초기 로드 ── */
  function init() {
    buildTable();
    // 이 브라우저에서 이미 제출한 경우 이름/팀으로 잠금 (단일 기기 공유 환경)
    // → 브라우저에 저장된 마지막 잠금 정보 확인
    const lockRaw = localStorage.getItem('safety_eval_lock');
    if (lockRaw) {
      try { applyLock(JSON.parse(lockRaw)); } catch(e) {}
    }
  }

  // 제출 시 잠금 정보도 별도 저장 (기기별 잠금용)
  const _origSubmit = submitEval;
  window.submitEval = function() {
    const info = validate();
    if (!info) return;
    const subs = getSubmissions();
    const dup = subs.find(s => s.name === info.name && s.team === info.team);
    if (dup) {
      alert(`이미 제출한 평가자입니다.\n\n성명: ${dup.name}\n소속팀: ${dup.team}\n제출일시: ${dup.submittedAt}\n\n동일 평가자는 재제출할 수 없습니다.`);
      return;
    }
    if (!confirm(`아래 정보로 평가를 제출하시겠습니까?\n\n성명: ${info.name}\n소속팀: ${info.team}\n\n⚠ 제출 후에는 수정이 불가능합니다.`)) return;

    const now = new Date();
    const submittedAt = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const submission = { name: info.name, team: info.team, scores: scores.map(r=>[...r]), submittedAt };

    subs.push(submission);
    localStorage.setItem(STORE_KEY, JSON.stringify(subs));
    localStorage.setItem('safety_eval_lock', JSON.stringify(submission)); // 기기별 잠금
    applyLock(submission);
  };

  init();
</script>
</body>
</html>
