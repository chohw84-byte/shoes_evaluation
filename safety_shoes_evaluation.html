<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>안전화 제품 평가표</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --navy:  #1a2e4a;
      --gold:  #f4b400;
      --green: #1b8a3e;
      --bg:    #f0f4f8;
      --card:  #ffffff;
      --border:#dde6f0;
      --muted: #7a8fa6;
      --r:     14px;
    }

    html, body {
      font-family: 'Segoe UI', 'Malgun Gothic', Apple SD Gothic Neo, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--navy);
    }

    /* ── 고정 헤더 ── */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy); color: #fff;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .top-bar-title { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .top-bar-info  { font-size: 0.78rem; color: #9bbde0; text-align: right; line-height: 1.5; }

    .page {
      max-width: 540px; margin: 0 auto;
      padding: 20px 16px 130px;
    }

    /* ── 안내 문구 ── */
    .notice {
      background: #fff8e1; border-left: 4px solid var(--gold);
      border-radius: 8px; padding: 12px 16px;
      margin-bottom: 20px; color: #7a5c00;
      font-size: 0.88rem; line-height: 1.6;
    }

    /* ── 평가자 카드 ── */
    .evaluator-card {
      background: var(--card); border-radius: var(--r);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 20px; margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .card-section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label { font-size: 0.88rem; font-weight: 700; color: var(--navy); }
    .required-mark { color: #e53935; }
    .field-group input {
      padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: 9px; font-size: 1rem; color: var(--navy);
      background: #f8fafd; outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none; appearance: none;
    }
    .field-group input:focus {
      border-color: var(--navy); background: #fff;
      box-shadow: 0 0 0 3px rgba(26,46,74,0.09);
    }
    .field-group input.invalid { border-color: #e53935; background: #fff5f5; }
    .field-group input:disabled { background: #e8edf3; color: #555; }
    .field-error { font-size: 0.78rem; color: #e53935; min-height: 15px; }

    /* ── 제출 완료 배너 ── */
    .submitted-banner {
      display: none; background: #e8f5e9;
      border: 1.5px solid #43a047; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 20px; color: #1b5e20;
      align-items: flex-start; gap: 12px;
    }
    .submitted-banner .s-icon { font-size: 1.5rem; flex-shrink: 0; }

    /* ── 진행률 ── */
    .progress-wrap { margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .progress-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .progress-bar { flex: 1; height: 6px; background: #dde6f0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; width: 0%; }

    /* ── 제품 카드 ── */
    .product-card {
      background: var(--card); border-radius: var(--r);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 16px; overflow: hidden;
    }
    .card-header {
      background: var(--navy); color: #fff;
      padding: 13px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .prod-name { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .prod-num {
      background: rgba(255,255,255,0.18); border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800; flex-shrink: 0;
    }
    .crit-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #f0f4f8; gap: 10px;
    }
    .crit-row:last-child { border-bottom: none; }
    .crit-label { font-size: 0.92rem; font-weight: 600; white-space: nowrap; min-width: 72px; }

    /* ── 별점 ── */
    .star-group { display: flex; flex-direction: row-reverse; gap: 2px; }
    .star-group input[type="radio"] { display: none; }
    .star-group label {
      font-size: 2.1rem; color: #d0d8e4;
      cursor: pointer; line-height: 1;
      padding: 4px 3px;
      transition: color .12s, transform .08s;
      user-select: none; -webkit-user-select: none;
    }
    .star-group input:checked ~ label { color: var(--gold); }
    @media (hover: hover) {
      .star-group label:hover,
      .star-group label:hover ~ label { color: var(--gold); }
    }
    .star-group label:active { transform: scale(1.25); color: var(--gold); }
    .locked .star-group label { pointer-events: none; cursor: default; }

    /* ── 하단 고정 버튼 ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #fff; padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 20px rgba(0,0,0,0.10);
      display: flex; gap: 10px;
    }
    .btn-reset {
      flex: 0 0 auto; padding: 15px 20px;
      background: #e8edf3; color: #555;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      -webkit-appearance: none; appearance: none;
    }
    .btn-reset:active:not(:disabled) { background: #d0d7e2; }
    .btn-submit {
      flex: 1; padding: 15px;
      background: var(--green); color: #fff;
      border: none; border-radius: 10px;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.03em;
      transition: background .15s;
      -webkit-appearance: none; appearance: none;
    }
    .btn-submit:active:not(:disabled) { background: #156e31; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 로딩 오버레이 ── */
    .loading-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(255,255,255,0.75);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #dde6f0;
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.9rem; color: var(--navy); font-weight: 600; }
  </style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">처리 중...</div>
</div>

<!-- 고정 헤더 -->
<div class="top-bar">
  <div class="top-bar-title">🥾 안전화 평가표</div>
  <div class="top-bar-info" id="topInfo">성명 / 소속팀을<br>먼저 입력해 주세요</div>
</div>

<div class="page">

  <div class="notice">
    ⚠️ &nbsp;평가하지 않은 항목은 <strong>자동으로 3점</strong>으로 반영됩니다.<br>
    별을 탭하여 1~5점으로 평가해 주세요.
  </div>

  <!-- 평가자 정보 -->
  <div class="evaluator-card">
    <div class="card-section-title">📝 평가자 정보</div>
    <div class="field-group">
      <label for="inputName">성명 <span class="required-mark">*</span></label>
      <input type="text" id="inputName" placeholder="이름을 입력하세요"
             maxlength="20" autocomplete="off" inputmode="text" oninput="updateTopInfo()"/>
      <span class="field-error" id="errName"></span>
    </div>
    <div class="field-group">
      <label for="inputTeam">소속팀 <span class="required-mark">*</span></label>
      <input type="text" id="inputTeam" placeholder="소속팀을 입력하세요"
             maxlength="30" autocomplete="off" inputmode="text" oninput="updateTopInfo()"/>
      <span class="field-error" id="errTeam"></span>
    </div>
  </div>

  <!-- 제출 완료 배너 -->
  <div class="submitted-banner" id="submittedBanner">
    <span class="s-icon">✅</span>
    <div>
      <strong style="font-size:0.98rem;">평가가 제출되었습니다.</strong><br>
      <span id="submittedInfo" style="font-size:0.85rem;"></span><br>
      <span style="font-size:0.82rem;color:#388e3c;margin-top:4px;display:block;">
        제출된 평가는 수정할 수 없습니다.
      </span>
    </div>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <span class="progress-label" id="progressLabel">0 / 24 항목 평가</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- 제품 카드 목록 -->
  <div id="cardList"></div>
</div>

<!-- 하단 고정 버튼 -->
<div class="bottom-bar">
  <button class="btn-reset" id="btnReset" onclick="resetAll()">↺ 초기화</button>
  <button class="btn-submit" id="btnSubmit" onclick="submitEval()">📤 평가 제출</button>
</div>

<script>
  /* ════════════════════════════════
     ⚙️  여기에 JSONBin 정보를 입력하세요
  ════════════════════════════════ */
  const JSONBIN_ID  = '6a167fadf47d5c455c3bbfbd';      // JSONBin Bin ID
  const JSONBIN_KEY = '$2a$10$ChZLbbECmdzPwOqVrVIbvOXomxW41ZdkL4G/2NCqvHzrSUx11qmn6';  // JSONBin Master Key
  const API_BASE    = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
  /* ════════════════════════════════ */

  const PRODUCTS = ['1번 제품','2번 제품','3번 제품','4번 제품','5번 제품','6번 제품'];
  const CRITERIA = [
    { label:'품질',   icon:'⭐' },
    { label:'착용감', icon:'🦶' },
    { label:'내구성', icon:'🔩' },
    { label:'디자인', icon:'🎨' },
  ];
  const DEFAULT   = 3;
  const LOCK_KEY  = 'safety_eval_lock';

  const scores  = Array.from({length:6}, () => Array(4).fill(DEFAULT));
  const touched = Array.from({length:6}, () => Array(4).fill(false));

  /* ── 로딩 표시 ── */
  function showLoading(msg = '처리 중...') {
    document.getElementById('loadingText').textContent = msg;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }

  /* ── JSONBin API ── */
  async function apiGet() {
    const res = await fetch(`${API_BASE}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!res.ok) throw new Error('데이터를 불러오지 못했습니다.');
    const json = await res.json();
    return json.record?.submissions || [];
  }

  async function apiPut(data) {
    const res = await fetch(API_BASE, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify({ submissions: data })
    });
    if (!res.ok) throw new Error('데이터 저장에 실패했습니다.');
  }

  /* ── 카드 생성 ── */
  function buildCards() {
    const list = document.getElementById('cardList');
    list.innerHTML = '';
    PRODUCTS.forEach((prod, pi) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      let critHTML = '';
      CRITERIA.forEach((crit, ci) => {
        const stars = [5,4,3,2,1].map(v => `
          <input type="radio" id="r-${pi}-${ci}-${v}" name="r-${pi}-${ci}" value="${v}" ${v===DEFAULT?'checked':''}>
          <label for="r-${pi}-${ci}-${v}" title="${v}점">★</label>
        `).join('');
        critHTML += `
          <div class="crit-row">
            <div class="crit-label">${crit.icon} ${crit.label}</div>
            <div class="star-group" id="stars-${pi}-${ci}">${stars}</div>
          </div>`;
      });
      card.innerHTML = `
        <div class="card-header">
          <div class="prod-name">
            <span class="prod-num">${String(pi+1).padStart(2,'0')}</span>${prod}
          </div>
        </div>
        <div>${critHTML}</div>`;
      list.appendChild(card);

      CRITERIA.forEach((_, ci) => {
        [5,4,3,2,1].forEach(v => {
          document.getElementById(`r-${pi}-${ci}-${v}`)
            .addEventListener('change', () => {
              scores[pi][ci]  = v;
              touched[pi][ci] = true;
              updateProgress();
            });
        });
      });
    });
    updateProgress();
  }

  function updateProgress() {
    const done = touched.flat().filter(Boolean).length;
    document.getElementById('progressFill').style.width = (done/24*100) + '%';
    document.getElementById('progressLabel').textContent = `${done} / 24 항목 평가`;
  }

  function updateTopInfo() {
    const name = document.getElementById('inputName').value.trim();
    const team = document.getElementById('inputTeam').value.trim();
    document.getElementById('topInfo').innerHTML =
      (name||team) ? `${name||'―'} · ${team||'―'}` : '성명 / 소속팀을<br>먼저 입력해 주세요';
  }

  /* ── 초기화 ── */
  function resetAll() {
    if (isLocked()) return;
    if (!confirm('모든 평가를 초기값(3점)으로 초기화할까요?')) return;
    for (let pi=0; pi<6; pi++)
      for (let ci=0; ci<4; ci++) {
        scores[pi][ci]  = DEFAULT;
        touched[pi][ci] = false;
        document.getElementById(`r-${pi}-${ci}-${DEFAULT}`).checked = true;
      }
    updateProgress();
  }

  /* ── 유효성 검사 ── */
  function validate() {
    const name = document.getElementById('inputName').value.trim();
    const team = document.getElementById('inputTeam').value.trim();
    let ok = true;
    if (!name) {
      document.getElementById('errName').textContent = '성명을 입력해 주세요.';
      document.getElementById('inputName').classList.add('invalid');
      document.getElementById('inputName').scrollIntoView({behavior:'smooth',block:'center'});
      ok = false;
    } else {
      document.getElementById('errName').textContent = '';
      document.getElementById('inputName').classList.remove('invalid');
    }
    if (!team) {
      document.getElementById('errTeam').textContent = '소속팀을 입력해 주세요.';
      document.getElementById('inputTeam').classList.add('invalid');
      if (ok) document.getElementById('inputTeam').scrollIntoView({behavior:'smooth',block:'center'});
      ok = false;
    } else {
      document.getElementById('errTeam').textContent = '';
      document.getElementById('inputTeam').classList.remove('invalid');
    }
    return ok ? {name, team} : null;
  }

  /* ── 제출 ── */
  async function submitEval() {
    const info = validate();
    if (!info) return;

    if (!confirm(`다음 정보로 평가를 제출할까요?\n\n성명: ${info.name}\n소속팀: ${info.team}\n\n⚠ 제출 후에는 수정이 불가능합니다.`)) return;

    showLoading('제출 중...');
    document.getElementById('btnSubmit').disabled = true;

    try {
      const subs = await apiGet();
      const dup  = subs.find(s => s.name===info.name && s.team===info.team);
      if (dup) {
        alert(`이미 제출한 평가자입니다.\n\n성명: ${dup.name}\n소속팀: ${dup.team}\n제출일시: ${dup.submittedAt}\n\n동일 평가자는 재제출할 수 없습니다.`);
        document.getElementById('btnSubmit').disabled = false;
        return;
      }

      const now = new Date();
      const submittedAt = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      const submission  = { name: info.name, team: info.team, scores: scores.map(r=>[...r]), submittedAt };

      subs.push(submission);
      await apiPut(subs);

      // 기기 잠금 저장
      localStorage.setItem(LOCK_KEY, JSON.stringify(submission));
      applyLock(submission);
      window.scrollTo({top:0, behavior:'smooth'});
    } catch(e) {
      alert(`오류: ${e.message}\n\nJSONBin ID와 Key를 확인해 주세요.`);
      document.getElementById('btnSubmit').disabled = false;
    } finally {
      hideLoading();
    }
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  /* ── 잠금 적용 ── */
  function applyLock(sub) {
    document.getElementById('inputName').value    = sub.name;
    document.getElementById('inputTeam').value    = sub.team;
    document.getElementById('inputName').disabled = true;
    document.getElementById('inputTeam').disabled = true;
    updateTopInfo();

    sub.scores.forEach((row, pi) => row.forEach((val, ci) => {
      scores[pi][ci] = val;
      document.getElementById(`r-${pi}-${ci}-${val}`).checked = true;
    }));

    document.querySelectorAll('#cardList input[type="radio"]').forEach(r => r.disabled = true);
    document.querySelectorAll('.star-group').forEach(g => g.classList.add('locked'));
    document.getElementById('btnReset').disabled  = true;
    document.getElementById('btnSubmit').disabled = true;

    const banner = document.getElementById('submittedBanner');
    banner.style.display = 'flex';
    document.getElementById('submittedInfo').textContent =
      `${sub.name} · ${sub.team} · ${sub.submittedAt}`;

    touched.forEach(r => r.fill(true));
    updateProgress();
  }

  function isLocked() { return document.getElementById('btnSubmit').disabled; }

  /* ── 초기 실행 ── */
  function init() {
    buildCards();
    // 이미 이 기기에서 제출했으면 잠금 복원
    const lockRaw = localStorage.getItem(LOCK_KEY);
    if (lockRaw) {
      try { applyLock(JSON.parse(lockRaw)); } catch(e) {}
    }
  }

  init();
</script>
</body>
</html>
